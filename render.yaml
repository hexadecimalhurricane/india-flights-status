services:
  - type: web
    name: infs
    runtime: python
    plan: free
    region: singapore      # closest to India with free tier

    buildCommand: pip install -r requirements.txt
    startCommand: python app.py

    healthCheckPath: /api/airports

    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.0"

    # Auto-deploy whenever main branch is pushed
    autoDeploy: true
